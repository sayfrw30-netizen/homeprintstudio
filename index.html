<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Print Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(120deg, #fdfbfb, #ebedee);
  color:#222;
  overflow-x:hidden;
}

/* Smooth scroll */
html { scroll-behavior: smooth; }

/* Navbar */
nav {
  position: sticky;
  top:0;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

nav h2 { font-weight:700; display:flex; align-items:center; gap:10px; }

.logo {
  height:40px;
  width:40px;
  object-fit:contain;
  border-radius:10px;
}

.logo-large {
  height:90px;
  width:90px;
  object-fit:contain;
}

nav a {
  text-decoration:none;
  margin-left:20px;
  color:#333;
  transition:0.3s;
}

nav a:hover {
  color:#6c63ff;
}

/* Hero */
header {
  min-height:90vh;
  padding:40px 20px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background: linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
  animation: fadeIn 1s ease;
}

header h1 {
  font-size: clamp(32px, 6vw, 60px);
  margin-bottom:10px;
}

header p {
  font-size: clamp(16px, 3vw, 22px);
}

button {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#000;
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform: scale(1.1);
  background:#6c63ff;
}

/* Services */
.container {
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

h2 {
  text-align:center;
  margin-bottom:30px;
}

.services {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.service {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  padding:25px;
  border-radius:20px;
  text-align:center;
  transition:0.4s;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  position:relative;
  overflow:hidden;
}

.service::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background: linear-gradient(120deg,#ffd966,#c9a0dc,#76d7c4);
  top:0;
  left:-100%;
  transition:0.5s;
  z-index:0;
}

.service:hover::before {
  left:0;
}

.service h3, .service p {
  position:relative;
  z-index:1;
}

.service:hover {
  transform: translateY(-15px) scale(1.05);
  color:white;
}

/* Contact */
.contact {
  margin-top:50px;
  padding:30px;
  border-radius:20px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  text-align:center;
}

.contact a {
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  background:#6c63ff;
  transition:0.3s;
}

.contact a:hover {
  transform: scale(1.1);
  background:#000;
}

/* Footer */
footer {
  text-align:center;
  padding:20px;
  background:#111;
  color:#fff;
}

/* Animations */
@keyframes fadeIn {
  from { opacity:0; transform: translateY(30px);} 
  to { opacity:1; transform: translateY(0);} 
}

/* Scroll reveal */
.reveal {
  opacity:0;
  transform: translateY(50px);
  transition:0.8s;
}

.reveal.active {
  opacity:1;
  transform: translateY(0);
}



/* Mobile Fix */
@media (max-width:600px){
  nav {
    flex-direction:column;
    gap:10px;
    padding:15px;
  }

  nav div {
    display:flex;
    gap:15px;
  }

  .container {
    padding:40px 15px;
  }

  .contact a {
    display:block;
    width:100%;
  }
}

</style>
</head>

<body>

<nav>
  <h2><img src="logo.png" class="logo"> Home Print</h2>
  <div>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<header>
  <img src="logo.png" class="logo-large" style="margin-bottom:15px;">
  <h1>Home Print Studio</h1>
  <p>Your Local Print Solution</p>
  <button onclick="document.getElementById('contact').scrollIntoView()">Contact Now</button>
</header>

<div class="container" id="services">
  <h2 class="reveal">Our Services</h2>

  <div class="services">
    <div class="service reveal">
      <h3>Quick Printing</h3>
      <p>Fast, high-quality prints.</p>
    </div>

    <div class="service reveal">
      <h3>Scanning</h3>
      <p>Clear and accurate scans.</p>
    </div>

    <div class="service reveal">
      <h3>Photocopy</h3>
      <p>Affordable copies.</p>
    </div>
  </div>

  <div class="contact reveal" id="contact">
    <h2>Contact Us</h2>

    <a href="https://wa.me/919179959714?text=Hello%20I%20want%20printing%20service" target="_blank" rel="noopener noreferrer">WhatsApp</a>
    <a href="tel:+918839603922">Call Now</a>

    <p style="margin-top:20px;">8, Ojha Khali Kunjdo Ka Waas, Ratlam</p>
  </div>
</div>

<footer>
  <p>© 2026 Home Print Studio</p>
</footer>

<script>
window.addEventListener('scroll', () => {
  document.querySelectorAll('.reveal').forEach(el => {
    let top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add('active');
    }
  });
});
function openWhatsApp(){
  window.open('https://wa.me/919179959714?text=Hello%20I%20want%20printing%20service','_blank');
}

function makeCall(){
  window.location.href = 'tel:+918839603922';
}

</script>

</body>
</html>
