<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Print Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  overflow-x:hidden;
}

h1,h2,h3{
  font-family:'Orbitron',sans-serif;
  letter-spacing:2px;
  text-transform:uppercase;
}

/* NAV */
nav{
  position:sticky;top:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  padding:15px 40px;
  display:flex;justify-content:space-between;align-items:center;
}

.logo{height:60px;width:60px;transition:0.5s}
.logo:hover{transform:scale(1.3) rotate(10deg)}

nav a{
  color:#fff;
  text-decoration:none;
  margin-left:20px;
  position:relative;
  transition:0.4s;
}

nav a::after{
  content:"";
  position:absolute;
  width:0%;height:2px;
  background:#00f7ff;
  left:0;bottom:-5px;
  transition:0.4s;
}

nav a:hover::after{width:100%}
nav a:hover{color:#00f7ff}

/* HERO */
header{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.logo-large{
  height:220px;width:220px;
  animation:float 3s infinite ease-in-out;
}

header h1{
  font-size:clamp(40px,6vw,70px);
  background:linear-gradient(90deg,#00f7ff,#ff00c8);
  -webkit-background-clip:text;
  color:transparent;
  animation:glitch 2s infinite;
}

header p{
  margin-top:10px;
  font-size:18px;
  opacity:0.8;
  animation:fadeIn 2s ease;
}

button{
  margin-top:20px;
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#00f7ff,#ff00c8);
  color:#000;
  font-weight:bold;
  cursor:pointer;
  transition:0.4s;
}

button:hover{
  transform:scale(1.2);
  box-shadow:0 0 20px #00f7ff;
}

/* SERVICES */
.container{padding:60px 20px;max-width:1100px;margin:auto}

.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.service{
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  text-align:center;
  transition:0.5s;
  position:relative;
  overflow:hidden;
}

.service::before{
  content:"";
  position:absolute;
  width:100%;height:100%;
  background:linear-gradient(120deg,transparent,#00f7ff,transparent);
  top:-100%;left:0;
  transition:0.6s;
}

.service:hover::before{top:100%}

.service:hover{
  transform:translateY(-15px) scale(1.1);
  box-shadow:0 0 25px #00f7ff;
}

.service h3{
  margin-bottom:10px;
  transition:0.4s;
}

.service:hover h3{
  color:#00f7ff;
  transform:scale(1.2);
}

/* CONTACT */
.contact{
  margin-top:50px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  text-align:center;
}

.contact a{
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  border-radius:30px;
  background:#00f7ff;
  color:#000;
  text-decoration:none;
  transition:0.4s;
}

.contact a:hover{
  transform:scale(1.2);
  background:#ff00c8;
  color:#fff;
}

footer{text-align:center;padding:20px;background:#000}

/* ANIMATIONS */
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-20px)}
  100%{transform:translateY(0)}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes glitch{
  0%{text-shadow:2px 2px #ff00c8,-2px -2px #00f7ff}
  50%{text-shadow:-2px 2px #ff00c8,2px -2px #00f7ff}
  100%{text-shadow:2px -2px #ff00c8,-2px 2px #00f7ff}
}

/* MOBILE */
@media(max-width:600px){
  .logo-large{height:160px;width:160px}
}

</style>
</head>

<body>

<nav>
  <h2><img src="./logo.png" class="logo"> Home Print</h2>
  <div>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<header>
  <img src="./logo.png" class="logo-large">
  <h1>Home Print Studio</h1>
  <p>Modern • Fast • Creative Printing</p>
  <button onclick="document.getElementById('contact').scrollIntoView()">Contact Now</button>
</header>

<div class="container" id="services">
  <h2>Our Services</h2>

  <div class="services">
    <div class="service">
      <h3>Quick Printing</h3>
      <p>High quality fast prints.</p>
    </div>

    <div class="service">
      <h3>Scanning</h3>
      <p>Clear digital scans.</p>
    </div>

    <div class="service">
      <h3>Photocopy</h3>
      <p>Affordable copies.</p>
    </div>
  </div>

  <div class="contact" id="contact">
    <h2>Contact Us</h2>
    <a href="https://wa.me/919179959714" target="_blank">WhatsApp</a>
    <a href="tel:+918839603922">Call Now</a>
    <p style="margin-top:20px;">Ratlam, Madhya Pradesh</p>
  </div>
</div>

<footer>
  <p>© 2026 Home Print Studio</p>
</footer>

</body>
</html>
