<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(120deg,#fdfbfb,#ebedee);
  color:#222;
  overflow-x:hidden;
}

html{scroll-behavior:smooth}

/* NAVBAR */
nav{
  position:sticky;
  top:0;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(12px);
  padding:12px 20px;
  z-index:100;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.nav-left h2{
  font-size:20px;
}

/* LOGO */
.logo{
  height:50px;
  width:50px;
  border-radius:12px;
  object-fit:cover;
  background:white;
  padding:4px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* HERO */
.grid-section{
  position:relative;
  width:100%;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
  overflow:hidden;
}

#gridCanvas{
  position:absolute;
  width:100%;
  height:100%;
}

.grid-content{
  position:relative;
  z-index:2;
  color:white;
  text-align:center;
  padding:10px;
}

/* MAIN LOGO BIGGER */
.grid-content img{
  height:260px;
  width:260px;
  border-radius:50%;
  padding:20px;
  object-fit:cover;
  margin:auto;
  display:block;

  background: radial-gradient(circle at center, #ffffff 60%, transparent 61%),
              linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);

  box-shadow:0 0 0 12px rgba(255,255,255,0.2),0 20px 50px rgba(0,0,0,0.3);
  animation:float 3s ease-in-out infinite;
}

/* TEXT CANVAS FIX */
.text-canvas{
  width:100%;
  max-width:100%;
  height:100px;
}

/* SERVICES */
.container{padding:50px 15px;max-width:1100px;margin:auto}

.services{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.service{
  flex:1;
  min-width:250px;
  background:rgba(255,255,255,0.85);
  padding:20px;
  border-radius:20px;
  text-align:center;
  transition:0.5s;
}

.service:hover{
  transform:translateY(-12px) scale(1.05);
  background:linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
  color:white;
}

.service-img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:10px;
}

.contact{
  margin-top:40px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.85);
  text-align:center;
}

.contact a{
  display:inline-block;
  margin:8px;
  padding:10px 18px;
  border-radius:25px;
  text-decoration:none;
  color:white;
  background:#6c63ff;
}

footer{
  text-align:center;
  padding:15px;
  background:#111;
  color:#fff;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
  100%{transform:translateY(0)}
}

/* MOBILE FIX */
@media(max-width:600px){
  .grid-content img{
    height:200px;
    width:200px;
  }
}
</style>
</head>

<body>

<nav>
  <div class="nav-left">
    <img src="./logo.png" class="logo">
    <h2>Home Print</h2>
  </div>
</nav>

<div class="grid-section" id="gridSection">
  <canvas id="gridCanvas"></canvas>

  <div class="grid-content">
    <img src="./logo.png">
    <canvas id="text1" class="text-canvas"></canvas>
    <canvas id="text2" class="text-canvas"></canvas>
  </div>
</div>

<div class="container">
  <h2>Our Services</h2>

  <div class="services">
    <div class="service">
      <img src="./printing.jpg" class="service-img">
      <h3>Quick Printing</h3>
      <p>Fast, high-quality prints.</p>
    </div>

    <div class="service">
      <img src="./scanning.jpg" class="service-img">
      <h3>Scanning</h3>
      <p>Clear scans.</p>
    </div>

    <div class="service">
      <img src="./photocopy.jpg" class="service-img">
      <h3>Photocopy</h3>
      <p>Affordable copies.</p>
    </div>
  </div>

  <div class="contact">
    <h2>Contact Us</h2>
    <a href="https://wa.me/919179959714" target="_blank">WhatsApp</a>
    <a href="tel:+918839603922">Call Now</a>
    <p style="margin-top:15px;">8, Ojha Khali Kunjdo Ka Waas, Ratlam</p>
  </div>
</div>

<footer>
  <p>© 2026 Home Print Studio</p>
</footer>

<script>
// MOVING GRID (INFINITE MOTION)
const canvas = document.getElementById("gridCanvas");
const ctx = canvas.getContext("2d");

let w,h,offset=0;

function resize(){
  w=canvas.width=innerWidth;
  h=canvas.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

function drawGrid(){
  ctx.clearRect(0,0,w,h);
  offset+=0.5;

  for(let x=-40;x<w+40;x+=40){
    for(let y=-40;y<h+40;y+=40){
      ctx.strokeStyle="rgba(0,120,180,0.5)";
      ctx.lineWidth=1.5;
      ctx.strokeRect(x+offset%40,y+offset%40,40,40);
    }
  }

  requestAnimationFrame(drawGrid);
}
drawGrid();

// PARTICLE BUILD TEXT (RESPONSIVE SIZE)
function buildText(id,text,size){
  const c=document.getElementById(id);
  const x=c.getContext("2d");

  c.width=innerWidth;
  c.height=100;

  let fontSize = innerWidth < 500 ? size*0.6 : size;

  x.font=fontSize+"px Poppins";
  x.fillStyle="white";
  x.textAlign="center";
  x.fillText(text,c.width/2,70);

  let particles=[];
  let data=x.getImageData(0,0,c.width,c.height).data;

  for(let y=0;y<c.height;y+=3){
    for(let xPos=0;xPos<c.width;xPos+=3){
      let i=(y*c.width+xPos)*4;
      if(data[i+3]>150){
        particles.push({
          tx:xPos,
          ty:y,
          x:Math.random()*c.width,
          y:Math.random()*c.height
        });
      }
    }
  }

  function animate(){
    x.clearRect(0,0,c.width,c.height);
    particles.forEach(p=>{
      p.x += (p.tx - p.x)*0.05;
      p.y += (p.ty - p.y)*0.05;
      x.fillStyle="white";
      x.fillRect(p.x,p.y,2,2);
    });
    requestAnimationFrame(animate);
  }
  animate();
}

buildText("text1","Home Print Studio",60);
buildText("text2","Your Local Print Solution",30);

</script>

</body>
</html>
