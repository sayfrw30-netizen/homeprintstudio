<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(120deg,#fdfbfb,#ebedee);
  color:#222;
  overflow-x:hidden;
}

html{scroll-behavior:smooth}

/* NAVBAR */
nav{
  position:sticky;
  top:0;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(12px);
  padding:12px 30px;
  z-index:100;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.nav-left h2{
  font-size:22px;
  font-weight:600;
  line-height:1;
}

/* LOGO (FIXED ALIGNMENT) */
.logo{
  height:42px;
  width:42px;
  border-radius:10px;
  object-fit:cover;
  background:white;
  padding:3px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  display:block;
}

/* HERO */
.grid-section{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
}

#gridCanvas{
  position:absolute;
  width:100%;
  height:100%;
  opacity:1; /* MORE VISIBLE */
}

.grid-content{
  position:relative;
  z-index:2;
  color:white;
  text-align:center;
}

/* MAIN LOGO */
.grid-content img{
  height:220px;
  width:220px;
  border-radius:50%;
  padding:20px;
  object-fit:cover;
  display:block;
  margin:auto;

  background: radial-gradient(circle at center, #ffffff 60%, transparent 61%),
              linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);

  box-shadow:
    0 0 0 12px rgba(255,255,255,0.2),
    0 20px 50px rgba(0,0,0,0.3);

  animation:float 3s ease-in-out infinite;
}

/* TEXT CANVAS */
.text-canvas{
  width:100%;
  height:90px;
}

/* SERVICES */
.container{padding:60px 20px;max-width:1100px;margin:auto}

h2{
  text-align:center;
  margin-bottom:30px;
}

.services{
  display:flex;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
}

.service{
  flex:1;
  min-width:250px;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:20px;
  text-align:center;
  transition:0.5s;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.service:hover{
  transform:translateY(-15px) scale(1.1);
  background:linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
  color:white;
}

.service-img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:12px;
}

/* CONTACT */
.contact{
  margin-top:50px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.8);
  text-align:center;
}

.contact a{
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  background:#6c63ff;
  transition:0.4s;
}

.contact a:hover{
  transform:scale(1.2);
  background:#000;
}

footer{
  text-align:center;
  padding:20px;
  background:#111;
  color:#fff;
}

/* ANIMATIONS */
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-20px)}
  100%{transform:translateY(0)}
}
</style>
</head>

<body>

<nav>
  <div class="nav-left">
    <img src="./logo.png" class="logo">
    <h2>Home Print</h2>
  </div>
</nav>

<div class="grid-section" id="gridSection">
  <canvas id="gridCanvas"></canvas>

  <div class="grid-content">
    <img src="./logo.png">

    <!-- VAPOR TEXT -->
    <canvas id="text1" class="text-canvas"></canvas>
    <canvas id="text2" class="text-canvas"></canvas>

  </div>
</div>

<div class="container">
  <h2>Our Services</h2>

  <div class="services">
    <div class="service">
      <img src="./printing.jpg" class="service-img">
      <h3>Quick Printing</h3>
      <p>Fast, high-quality prints.</p>
    </div>

    <div class="service">
      <img src="./scanning.jpg" class="service-img">

      <img src="./photocopy.jpg" class="service-img">

      <p>Affordable copies.</p>
    </div>
  </div>

  <div class="contact">
    <h2>Contact Us</h2>
    <a href="https://wa.me/919179959714" target="_blank">WhatsApp</a>
    <a href="tel:+918839603922">Call Now</a>
    <p style="margin-top:20px;">8, Ojha Khali Kunjdo Ka Waas, Ratlam</p>
  </div>
</div>

<footer>
  <p>© 2026 Home Print Studio</p>
</footer>

<script>
// GRID EFFECT (ENHANCED VISIBILITY)
const canvas = document.getElementById("gridCanvas");
const ctx = canvas.getContext("2d");

let width, height, mouseX=-1000, mouseY=-1000;

function resize(){
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

document.getElementById("gridSection").addEventListener("mousemove",(e)=>{
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function drawGrid(){
  ctx.clearRect(0,0,width,height);

  const size = 40;

  for(let x=0;x<width;x+=size){
    for(let y=0;y<height;y+=size){
      let dist = Math.hypot(mouseX-x,mouseY-y);
      let glow = Math.max(0,1-dist/180);

      ctx.strokeStyle = `rgba(0,100,160,${0.5+glow})`;
      ctx.lineWidth = 1 + glow*3;

      ctx.strokeRect(x,y,size,size);
    }
  }

  requestAnimationFrame(drawGrid);
}
drawGrid();


// VAPOR TEXT EFFECT
function vaporizeText(id,text,size){
  const canvas=document.getElementById(id);
  const ctx=canvas.getContext("2d");

  canvas.width=window.innerWidth;
  canvas.height=90;

  ctx.font=size+"px Poppins";
  ctx.fillStyle="white";
  ctx.textAlign="center";
  ctx.fillText(text,canvas.width/2,60);

  let particles=[];
  let data=ctx.getImageData(0,0,canvas.width,canvas.height).data;

  for(let y=0;y<canvas.height;y+=3){
    for(let x=0;x<canvas.width;x+=3){
      let i=(y*canvas.width+x)*4;
      if(data[i+3]>150){
        particles.push({x,y,dx:(Math.random()-0.5)*2,dy:(Math.random()-0.5)*2,a:1});
      }
    }
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.dx;
      p.y+=p.dy;
      p.a-=0.01;
      ctx.fillStyle=`rgba(255,255,255,${p.a})`;
      ctx.fillRect(p.x,p.y,2,2);
    });
    requestAnimationFrame(animate);
  }
  animate();
}

vaporizeText("text1","Home Print Studio",55);
vaporizeText("text2","Your Local Print Solution",28);

</script>

</body>
