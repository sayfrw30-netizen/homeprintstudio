<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Print Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(120deg, #fdfbfb, #ebedee);
  color:#222;
  overflow-x:hidden;
}

html { scroll-behavior: smooth; }

nav {
  position: sticky;
  top:0;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

nav h2 { display:flex; align-items:center; gap:10px; }

.logo {
  height:50px;
  width:50px;
  border-radius:12px;
  background:#fff;
  padding:5px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
  transition:0.4s;
}

.logo:hover {
  transform: scale(1.2) rotate(5deg);
}

header {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background: linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
}

.logo-large {
  height:150px;
  width:150px;
  background:#fff;
  padding:15px;
  border-radius:25px;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
  animation: float 3s ease-in-out infinite, glow 2s infinite alternate;
}

header h1 {
  font-size: clamp(35px, 6vw, 65px);
  animation: slideUp 1s ease forwards;
}

header p {
  font-size:20px;
  animation: fadeIn 2s ease;
}

button {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#000;
  color:#fff;
  cursor:pointer;
  transition:0.4s;
}

button:hover {
  transform: scale(1.1);
  background:#6c63ff;
}

.container {
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

h2 {
  text-align:center;
  margin-bottom:30px;
  animation: fadeIn 1.5s ease;
}

.services {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.service {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  padding:25px;
  border-radius:20px;
  text-align:center;
  transition:0.5s;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.service:hover {
  transform: translateY(-15px) scale(1.08) rotate(1deg);
  background: linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
  color:white;
}

.contact {
  margin-top:50px;
  padding:30px;
  border-radius:20px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  text-align:center;
}

.contact a {
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  background:#6c63ff;
  transition:0.4s;
}

.contact a:hover {
  transform: scale(1.2);
  background:#000;
}

footer {
  text-align:center;
  padding:20px;
  background:#111;
  color:#fff;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

@keyframes glow {
  from { box-shadow:0 0 10px rgba(255,255,255,0.5); }
  to { box-shadow:0 0 30px rgba(255,255,255,1); }
}

@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

@keyframes slideUp {
  from { transform: translateY(50px); opacity:0; }
  to { transform: translateY(0); opacity:1; }
}

</style>
</head>

<body>

<nav>
  <h2><img src="./logo.png" class="logo"> Home Print</h2>
  <div>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<header>
  <img src="./logo.png" class="logo-large">
  <h1>Home Print Studio</h1>
  <p>Your Local Print Solution</p>
  <button onclick="document.getElementById('contact').scrollIntoView()">Contact Now</button>
</header>

<div class="container" id="services">
  <h2>Our Services</h2>

  <div class="services">
    <div class="service">
      <h3>Quick Printing</h3>
      <p>Fast, high-quality prints.</p>
    </div>

    <div class="service">
      <h3>Scanning</h3>
      <p>Clear and accurate scans.</p>
    </div>

    <div class="service">
      <h3>Photocopy</h3>
      <p>Affordable copies.</p>
    </div>
  </div>

  <div class="contact" id="contact">
    <h2>Contact Us</h2>

    <a href="https://wa.me/919179959714" target="_blank">WhatsApp</a>
    <a href="tel:+918839603922">Call Now</a>

    <p style="margin-top:20px;">8, Ojha Khali Kunjdo Ka Waas, Ratlam</p>
  </div>
</div>

<footer>
  <p>© 2026 Home Print Studio</p>
</footer>

</body>
</html>
