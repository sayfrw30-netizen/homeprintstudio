<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(120deg,#fdfbfb,#ebedee);
  color:#222;
  overflow-x:hidden;
}

html{scroll-behavior:smooth}

/* NAV */
nav{
  position:sticky;top:0;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);
  padding:15px 40px;
  display:flex;justify-content:space-between;align-items:center;

nav h2{display:flex;align-items:center;gap:12px;font-weight:700}

.logo{
  height:60px;width:60px;
  border-radius:14px;
  background:#fff;
  padding:6px;
  box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

/* 🔥 NEW GRID ANIMATION */
.grid-section{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f0f0f;
}

#gridCanvas{
  position:absolute;
  width:100%;
  height:100%;
}

.grid-content{
  position:relative;
  z-index:2;
  color:white;
  text-align:center;
}

.grid-content img{
  height:180px;
  margin-bottom:15px;
}

.grid-content h1{
  font-size:50px;
}

.grid-content p{
  font-size:18px;
}

/* SERVICES */
.container{padding:60px 20px;max-width:1100px;margin:auto}

.services{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.service{
  flex:1;
  min-width:250px;
  background:rgba(255,255,255,0.7);
  padding:25px;
  border-radius:20px;
  text-align:center;
}

.service-img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:12px;
}

/* CONTACT */
.contact{
  margin-top:50px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.7);
  text-align:center;
}

.contact a{
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  background:#6c63ff;
}

footer{
  text-align:center;
  padding:20px;
  background:#111;
  color:#fff;

<body>

</div>

<footer>
  <p>© 2026 Home Print Studio</p>
</footer>

<!-- 🔥 ANIMATION SCRIPT -->
<script>
const canvas = document.getElementById("gridCanvas");
const ctx = canvas.getContext("2d");

let width, height;
let offsetX = 0;
let offsetY = 0;
let mouseX = 0;
let mouseY = 0;

function resize(){
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

document.getElementById("gridSection").addEventListener("mousemove",(e)=>{
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function drawGrid(){
  ctx.clearRect(0,0,width,height);

  const size = 40;

  for(let x = -size; x < width + size; x += size){
    for(let y = -size; y < height + size; y += size){

      let dist = Math.hypot(mouseX - x, mouseY - y);
      let opacity = Math.max(0, 1 - dist / 300);

      ctx.strokeStyle = `rgba(255,255,255,${opacity * 0.8})`;

      ctx.beginPath();
      ctx.moveTo(x + offsetX, y + offsetY);
      ctx.lineTo(x + size + offsetX, y + offsetY);
      ctx.lineTo(x + offsetX, y + size + offsetY);
      ctx.stroke();
    }
  }

  offsetX = (offsetX + 0.5) % 40;
  offsetY = (offsetY + 0.5) % 40;

  requestAnimationFrame(drawGrid);
}

drawGrid();
</script>

</body>
