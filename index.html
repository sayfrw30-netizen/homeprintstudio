<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Print Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(120deg,#fdfbfb,#ebedee);
  color:#222;
}

nav{
  position:sticky;top:0;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
  padding:15px 40px;
  display:flex;justify-content:space-between;align-items:center;
}

.logo{height:60px;width:60px;transition:0.3s}
.logo:hover{transform:scale(1.1)}

nav a{
  text-decoration:none;
  margin-left:20px;
  color:#333;
  transition:0.3s;
}
nav a:hover{color:#6c63ff}

header{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
}

.logo-large{
  height:180px;width:180px;
  margin-bottom:10px;
}

header h1{
  font-size:clamp(40px,6vw,65px);
}

header p{
  font-size:18px;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#000;
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}
button:hover{transform:scale(1.1)}

.container{padding:60px 20px;max-width:1100px;margin:auto}

h2{text-align:center;margin-bottom:30px}

.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.service{
  background:#fff;
  padding:25px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.service:hover{
  transform:translateY(-10px);
}

.contact{
  margin-top:50px;
  padding:30px;
  border-radius:15px;
  background:#fff;
  text-align:center;
}

.contact a{
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  background:#6c63ff;
  transition:0.3s;
}

.contact a:hover{
  transform:scale(1.1);
}

footer{text-align:center;padding:20px;background:#111;color:#fff}

@media(max-width:600px){
  .logo-large{height:140px;width:140px}
}

</style>
</head>

<body>

<nav>
  <h2><img src="./logo.png" class="logo"> Home Print</h2>
  <div>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<header>
  <img src="./logo.png" class="logo-large">
  <h1>Home Print Studio</h1>
  <p>Your Local Print Solution</p>
  <button onclick="document.getElementById('contact').scrollIntoView()">Contact Now</button>
</header>

<div class="container" id="services">
  <h2>Our Services</h2>

  <div class="services">
    <div class="service">
      <h3>Quick Printing</h3>
      <p>Fast, high-quality prints.</p>
    </div>

    <div class="service">
      <h3>Scanning</h3>
      <p>Clear and accurate scans.</p>
    </div>

    <div class="service">
      <h3>Photocopy</h3>
      <p>Affordable copies.</p>
    </div>
  </div>

  <div class="contact" id="contact">
    <h2>Contact Us</h2>

    <a href="https://wa.me/919179959714" target="_blank">WhatsApp</a>
    <a href="tel:+918839603922">Call Now</a>

    <p style="margin-top:20px;">Ratlam, Madhya Pradesh</p>
  </div>
</div>

<footer>
  <p>© 2026 Home Print Studio</p>
</footer>

</body>
</html>
