<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(120deg,#fdfbfb,#ebedee);
  color:#222;
  overflow-x:hidden;
}

html{scroll-behavior:smooth}

/* NAVBAR */
nav{
  position:sticky;
  top:0;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);
  padding:10px 30px;
  z-index:100;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.nav-left h2{
  margin:0;
  font-size:22px;
  font-weight:600;
}

/* LOGO (NAV) */
.logo{
  height:45px;
  width:45px;
  border-radius:10px;
  object-fit:cover;
  background:white;
  padding:4px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  transition:0.3s;
}

.logo:hover{
  transform:scale(1.1);
}

/* HERO */
.grid-section{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
}

#gridCanvas{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0.7;
}

.grid-content{
  position:relative;
  z-index:2;
  color:white;
  text-align:center;
}

/* MAIN LOGO */
.grid-content img{
  height:220px;
  width:220px;
  border-radius:50%;
  padding:20px;

  object-fit:cover;
  display:block;
  margin:auto;

  background: radial-gradient(circle at center, #ffffff 60%, transparent 61%),
              linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);

  box-shadow:
    0 0 0 12px rgba(255,255,255,0.2),
    0 20px 50px rgba(0,0,0,0.3);

  animation:float 3s ease-in-out infinite;
  transition:0.4s;
}

.grid-content img:hover{
  transform:scale(1.15) rotate(5deg);
}

.grid-content h1{
  font-size:clamp(40px,6vw,70px);
}

.grid-content p{
  font-size:20px;
}

/* SERVICES */
.container{padding:60px 20px;max-width:1100px;margin:auto}

h2{
  text-align:center;
  margin-bottom:30px;
  animation:fadeIn 1.5s ease;
}

.services{
  display:flex;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
}

.service{
  flex:1;
  min-width:250px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:20px;
  text-align:center;
  transition:0.5s;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.service:hover{
  transform:translateY(-15px) scale(1.1);
  background:linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
  color:white;
}

.service-img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:12px;
  transition:0.4s;
}

.service:hover .service-img{
  transform:scale(1.05);
}

/* CONTACT */
.contact{
  margin-top:50px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  text-align:center;
}

.contact a{
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  background:#6c63ff;
  transition:0.4s;
}

.contact a:hover{
  transform:scale(1.2);
  background:#000;
}

footer{
  text-align:center;
  padding:20px;
  background:#111;
  color:#fff;
}

/* ANIMATIONS */
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-20px)}
  100%{transform:translateY(0)}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}
</style>
</head>

<body>

<nav>
  <div class="nav-left">
    <img src="./logo.png" class="logo">
    <h2>Home Print</h2>
  </div>
</nav>

<div class="grid-section" id="gridSection">
  <canvas id="gridCanvas"></canvas>

  <div class="grid-content">
    <img src="./logo.png">
    <h1>Home Print Studio</h1>
    <p>Your Local Print Solution</p>
  </div>
</div>

<div class="container">
  <h2>Our Services</h2>

  <div class="services">
    <div class="service">
      <img src="./printing.jpg" class="service-img">
      <h3>Quick Printing</h3>
      <p>Fast, high-quality prints.</p>
    </div>

    <div class="service">
      <img src="./scanning.jpg" class="service-img">
      <h3>Scanning</h3>
      <p>Clear and accurate scans.</p>
    </div>

    <div class="service">
      <img src="./photocopy.jpg" class="service-img">
      <h3>Photocopy</h3>
      <p>Affordable copies.</p>
    </div>
  </div>

  <div class="contact">
    <h2>Contact Us</h2>
    <a href="https://wa.me/919179959714" target="_blank">WhatsApp</a>
    <a href="tel:+918839603922">Call Now</a>
    <p style="margin-top:20px;">8, Ojha Khali Kunjdo Ka Waas, Ratlam</p>
  </div>
</div>

<footer>
  <p>© 2026 Home Print Studio</p>
</footer>

<script>
const canvas = document.getElementById("gridCanvas");
const ctx = canvas.getContext("2d");

let width, height;
let offsetX = 0;
let offsetY = 0;
let mouseX = -1000;
let mouseY = -1000;

function resize(){
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

document.getElementById("gridSection").addEventListener("mousemove",(e)=>{
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function drawGrid(){
  ctx.clearRect(0,0,width,height);

  const size = 40;

  for(let x = -size; x < width + size; x += size){
    for(let y = -size; y < height + size; y += size){

      let dist = Math.hypot(mouseX - x, mouseY - y);
      let glow = Math.max(0, 1 - dist / 200);
      let opacity = 0.3 + glow * 0.9;

      ctx.strokeStyle = `rgba(0, 80, 120, ${opacity})`;
      ctx.lineWidth = 1 + glow * 2.5;

      ctx.beginPath();
      ctx.moveTo(x + offsetX, y + offsetY);
      ctx.lineTo(x + size + offsetX, y + offsetY);
      ctx.lineTo(x + offsetX, y + size + offsetY);
      ctx.stroke();
    }
  }

  offsetX = (offsetX + 0.5) % 40;
  offsetY = (offsetY + 0.5) % 40;

  requestAnimationFrame(drawGrid);
}

drawGrid();
</script>

</body>
</html>
