html{scroll-behavior:smooth}

nav{

.grid-section{

  display:flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);

}

#gridCanvas{

  width:100%;

}

.grid-content{
  position:relative;
  z-index:2;
  color:white;
  text-align:center;
  padding:20px;

/* MAIN LOGO BIGGER */

  height:260px;
  width:260px;
  border-radius:50%;
  padding:20px;

  animation:float 3s ease-in-out infinite;
  cursor:pointer;
  transition:transform 0.3s;
}

.grid-content img:hover{
  transform:scale(1.05);
}

/* TEXT CANVAS FIX */
.text-canvas{
  width:100%;
  max-width:100%;
  height:100px;
}

/* SERVICES SECTION */
.container{padding:60px 20px;max-width:1200px;margin:auto}

  background-clip:text;
}

.services{

  flex-wrap:wrap;
  justify-content:center;
}

.service{

  border-radius:25px;
  text-align:center;
  transition:0.5s;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  cursor:pointer;
  animation:fadeInUp 0.6s ease-out;
}

.service:hover{
  transform:translateY(-12px) scale(1.05);
  background:linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
  color:white;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.service:hover h3,
.service:hover p{
  color:white;
}

.service-img{

  height:160px;
  object-fit:cover;
  border-radius:15px;
  margin-bottom:20px;
  transition:transform 0.3s;
}

.service:hover .service-img{

}

.service h3{

  transition:color 0.3s;
}

.service p{

  line-height:1.6;
  margin-bottom:15px;
  transition:color 0.3s;
}

/* Animation keyframes */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Stagger animation for service boxes */
.service:nth-child(1) {

}
.service:nth-child(2) {
  animation-delay: 0.3s;
}
.service:nth-child(3) {

<script>
// MOVING GRID (INFINITE MOTION)
const canvas = document.getElementById("gridCanvas");
const ctx = canvas.getContext("2d");

let w,h,offset=0;

function resize(){
  w=canvas.width=innerWidth;
  h=canvas.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

function drawGrid(){
  ctx.clearRect(0,0,w,h);
  offset+=0.5;

  for(let x=-40;x<w+40;x+=40){
    for(let y=-40;y<h+40;y+=40){
      ctx.strokeStyle="rgba(255,255,255,0.3)";
      ctx.lineWidth=1.5;
      ctx.strokeRect(x+offset%40,y+offset%40,40,40);
    }
  }

  requestAnimationFrame(drawGrid);
}
drawGrid();

// PARTICLE BUILD TEXT (RESPONSIVE SIZE)
function buildText(id,text,size){
  const c=document.getElementById(id);
  const x=c.getContext("2d");

  c.width=innerWidth;
  c.height=100;

  let fontSize = innerWidth < 500 ? size*0.6 : size;

  x.font=fontSize+"px Poppins";
  x.fillStyle="white";
  x.textAlign="center";
  x.fillText(text,c.width/2,70);

  let particles=[];
  let data=x.getImageData(0,0,c.width,c.height).data;

  for(let y=0;y<c.height;y+=3){
    for(let xPos=0;xPos<c.width;xPos+=3){
      let i=(y*c.width+xPos)*4;
      if(data[i+3]>150){
        particles.push({
          tx:xPos,
          ty:y,
          x:Math.random()*c.width,
          y:Math.random()*c.height
        });
      }
    }
  }

  function animate(){
    x.clearRect(0,0,c.width,c.height);
    particles.forEach(p=>{
      p.x += (p.tx - p.x)*0.05;
      p.y += (p.ty - p.y)*0.05;
      x.fillStyle="white";
      x.fillRect(p.x,p.y,2,2);
    });
    requestAnimationFrame(animate);
  }
  animate();
}

buildText("text1","Home Print Studio",60);
