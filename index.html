<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Print Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(120deg,#fdfbfb,#ebedee);
  color:#222;
  overflow-x:hidden;
}

html{scroll-behavior:smooth}

/* NAV */
nav{
  position:sticky;top:0;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);
  padding:15px 40px;
  display:flex;justify-content:space-between;align-items:center;
}

nav h2{display:flex;align-items:center;gap:12px;font-weight:700}

.logo{
  height:60px;width:60px;
  border-radius:14px;
  background:#fff;
  padding:6px;
  box-shadow:0 6px 20px rgba(0,0,0,0.2);
  transition:0.4s;
}

.logo:hover{transform:scale(1.2) rotate(6deg)}

/* HERO */
header{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
}

.logo-large{
  height:300px;
  width:300px;
  padding:20px;
  border-radius:50%;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
  animation:float 3s ease-in-out infinite;
  transition:0.4s;
}

.logo-large:hover{
  transform:scale(1.2) translateY(-10px);
}

header h1{
  font-size:clamp(40px,6vw,70px);
  margin-top:10px;
}

header p{font-size:20px}

/* SERVICES */
.container{padding:60px 20px;max-width:1100px;margin:auto}

.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.service{
  background:rgba(255,255,255,0.7);
  padding:25px;
  border-radius:20px;
  text-align:center;
  transition:0.5s;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.service:hover{
  transform:translateY(-15px) scale(1.05);
}

/* 🔥 NEW IMAGE STYLE */
.service img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:15px;
  margin-bottom:15px;
  transition:0.4s;
}

.service:hover img{
  transform:scale(1.08);
}

.contact{
  margin-top:50px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.7);
  text-align:center;
}

footer{
  text-align:center;
  padding:20px;
  background:#111;
  color:#fff;
}

/* ANIMATION */
@keyframes float{
  50%{transform:translateY(-20px)}
}
</style>

</head>

<body>

<nav>
  <h2><img src="./logo.png" class="logo"> Home Print</h2>
</nav>

<header>
  <img src="./logo.png" class="logo-large">
  <h1>Home Print Studio</h1>
  <p>Your Local Print Solution</p>
</header>

<div class="container" id="services">
  <h2 style="text-align:center;margin-bottom:30px;">Our Services</h2>

  <div class="services">

```
<div class="service">
  <img src="./printing.jpg">
  <h3>Quick Printing</h3>
  <p>Fast, high-quality prints.</p>
</div>

<div class="service">
  <img src="./scanning.jpg">
  <h3>Scanning</h3>
  <p>Clear and accurate scans.</p>
</div>

<div class="service">
  <img src="./photocopy.jpg">
  <h3>Photocopy</h3>
  <p>Affordable copies.</p>
</div>
```

  </div>

  <div class="contact" id="contact">
    <h2>Contact Us</h2>
    <a href="https://wa.me/919179959714" target="_blank">WhatsApp</a>
    <a href="tel:+918839603922">Call Now</a>
    <p style="margin-top:20px;">Ratlam</p>
  </div>
</div>

<footer>
  <p>© 2026 Home Print Studio</p>
</footer>

</body>
</html>
