<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(120deg,#fdfbfb,#ebedee);
  color:#222;
  overflow-x:hidden;
}

html{scroll-behavior:smooth}

/* NAVBAR */
nav{
  position:sticky;
  top:0;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(12px);
  padding:12px 30px;
  z-index:100;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.nav-left h2{
  font-size:22px;
  font-weight:600;
}

.logo{
  height:42px;
  width:42px;
  border-radius:10px;
  object-fit:cover;
  background:white;
  padding:3px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* HERO */
.grid-section{
  position:relative;
  width:100%;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
}

#gridCanvas{
  position:absolute;
  width:100%;
  height:100%;
}

.grid-content{
  position:relative;
  z-index:2;
  color:white;
  text-align:center;
}

.grid-content img{
  height:220px;
  width:220px;
  border-radius:50%;
  padding:20px;
  object-fit:cover;
  margin:auto;
  display:block;
  background: radial-gradient(circle at center, #ffffff 60%, transparent 61%),
              linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
  box-shadow:0 0 0 12px rgba(255,255,255,0.2),0 20px 50px rgba(0,0,0,0.3);
  animation:float 3s ease-in-out infinite;
}

.text-canvas{
  width:100%;
  height:90px;
}

/* SERVICES */
.container{padding:60px 20px;max-width:1100px;margin:auto}

.services{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.service{
  flex:1;
  min-width:250px;
  background:rgba(255,255,255,0.8);
  padding:25px;
  border-radius:20px;
  text-align:center;
  transition:0.5s;
}

.service:hover{
  transform:translateY(-15px) scale(1.1);
  background:linear-gradient(135deg,#ffd966,#c9a0dc,#76d7c4);
  color:white;
}

.service-img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:12px;
}

.contact{
  margin-top:50px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.8);
  text-align:center;
}

.contact a{
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  background:#6c63ff;
}

footer{
  text-align:center;
  padding:20px;
  background:#111;
  color:#fff;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-20px)}
  100%{transform:translateY(0)}
}
</style>

<body>

<div class="grid-section" id="gridSection">

  <div class="grid-content">

    <canvas id="text2" class="text-canvas"></canvas>

</div>

<div class="container">

  <div class="services">
    <div class="service">
      <img src="./printing.jpg" class="service-img">
      <h3>Quick Printing</h3>
      <p>Fast, high-quality prints.</p>
    </div>

    <div class="service">
      <img src="./scanning.jpg" class="service-img">
      <h3>Scanning</h3>
      <p>Clear and accurate scans.</p>
    </div>

    <div class="service">
      <img src="./photocopy.jpg" class="service-img">
      <h3>Photocopy</h3>
      <p>Affordable copies.</p>
    </div>
  </div>

  <div class="contact">
    <h2>Contact Us</h2>
    <a href="https://wa.me/919179959714" target="_blank">WhatsApp</a>
    <a href="tel:+918839603922">Call Now</a>
    <p style="margin-top:20px;">8, Ojha Khali Kunjdo Ka Waas, Ratlam</p>
  </div>
</div>

<footer>
  <p>© 2026 Home Print Studio</p>
</footer>

<script>
// GRID
const canvas = document.getElementById("gridCanvas");
const ctx = canvas.getContext("2d");
let w,h,mouseX=-1000,mouseY=-1000;

function resize(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}
resize(); window.addEventListener("resize",resize);

document.getElementById("gridSection").addEventListener("mousemove",(e)=>{
  mouseX=e.clientX; mouseY=e.clientY;
});

function grid(){
  ctx.clearRect(0,0,w,h);
  for(let x=0;x<w;x+=40){
    for(let y=0;y<h;y+=40){
      let d=Math.hypot(mouseX-x,mouseY-y);
      let g=Math.max(0,1-d/180);
      ctx.strokeStyle=`rgba(0,100,160,${0.4+g})`;
      ctx.lineWidth=1+g*3;
      ctx.strokeRect(x,y,40,40);
    }
  }
  requestAnimationFrame(grid);
}
grid();

// REVERSE PARTICLE BUILD TEXT
function buildText(id,text,size){
  const c=document.getElementById(id);
  const x=c.getContext("2d");

  c.width=innerWidth;
  c.height=90;

  x.font=size+"px Poppins";
  x.fillStyle="white";
  x.textAlign="center";
  x.fillText(text,c.width/2,60);

  let particles=[];
  let data=x.getImageData(0,0,c.width,c.height).data;

  for(let y=0;y<c.height;y+=3){
    for(let xPos=0;xPos<c.width;xPos+=3){
      let i=(y*c.width+xPos)*4;
      if(data[i+3]>150){
        particles.push({
          tx:xPos,
          ty:y,
          x:Math.random()*c.width,
          y:Math.random()*c.height,
        });
      }
    }
  }

  function animate(){
    x.clearRect(0,0,c.width,c.height);
    particles.forEach(p=>{
      p.x += (p.tx - p.x)*0.05;
      p.y += (p.ty - p.y)*0.05;
      x.fillStyle="white";
      x.fillRect(p.x,p.y,2,2);
    });
    requestAnimationFrame(animate);
  }
  animate();
}

buildText("text1","Home Print Studio",55);
buildText("text2","Your Local Print Solution",28);

</script>

</body>
